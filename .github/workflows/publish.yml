name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.2.3). If empty, uses the workflow ref."
        required: false
        type: string
      publish_to_crates_io:
        description: "Publish to crates.io (requires CARGO_REGISTRY_TOKEN secret)"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag (release)
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "TAG=${{ github.event.release.tag_name }}" >> "${GITHUB_ENV}"

      - name: Resolve tag (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail

          tag_input="${{ github.event.inputs.tag }}"
          if [[ -n "${tag_input}" ]]; then
            echo "TAG=${tag_input}" >> "${GITHUB_ENV}"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          fi

      - name: Ensure tag is set
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TAG:-}" ]]; then
            echo "TAG was not resolved." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        shell: bash
        env:
          TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import pathlib
          import sys

          try:
              import tomllib
          except ModuleNotFoundError:  # pragma: no cover
              import tomli as tomllib  # type: ignore

          tag = os.environ["TAG"]
          cargo_toml = pathlib.Path("Cargo.toml").read_bytes()
          data = tomllib.loads(cargo_toml)
          version = data["package"]["version"]

          expected = f"v{version}"
          if tag != expected:
              print(
                  f"Tag/version mismatch: tag={tag!r} expected={expected!r} (Cargo.toml version={version!r})",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Run tests (locked)
        run: cargo test --workspace --all-features --locked

      - name: Create crate package (locked)
        run: cargo package --locked

      - name: Publish to crates.io
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_crates_io == 'true') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set; refusing to publish." >&2
            exit 1
          fi
          cargo publish --locked
